<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng ký tài khoản</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    body { background:#fafafa; }
    .card { border:1px solid #eee; box-shadow:0 8px 30px rgba(0,0,0,.06); border-radius:16px; }
    .btn-primary { background:#2d6cdf; border:none; }
    .btn-primary:hover { background:#255ac0; }
    .form-control { border-radius:12px; }
    #avatarPreview { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 2px solid #eee; display:none; }
    #clearAvatarBtn { display:none; margin-top: 8px; }
    #register-result { font-weight:600; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card p-4">
          <h2 class="text-center mb-3">Đăng ký tài khoản</h2>

          <form id="register-form" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="username">Tên đăng nhập</label>
                <input class="form-control" id="username" name="username" required />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="password">Mật khẩu</label>
                <input class="form-control" id="password" name="password" type="password" minlength="6" required />
              </div>
              <div class="col-md-12">
                <label class="form-label" for="name">Họ tên</label>
                <input class="form-control" id="name" name="name" required />
              </div>
              <div class="col-md-12">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" required />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="phone">Số điện thoại</label>
                <input class="form-control" id="phone" name="phone" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="address">Địa chỉ</label>
                <input class="form-control" id="address" name="address" />
              </div>

              <div class="col-12">
                <label class="form-label" for="avatarFile">Ảnh đại diện (tải lên)</label>
                <input class="form-control" id="avatarFile" name="avatarFile" type="file" accept="image/*" />
              </div>
              <div class="col-12">
                <label class="form-label" for="avatarUrl">Hoặc dán link ảnh (URL)</label>
                <input class="form-control" id="avatarUrl" name="avatarUrl" placeholder="https://..." />
              </div>
              <div class="col-12 d-flex align-items-center gap-3">
                <img id="avatarPreview" alt="Preview" />
                <button class="btn btn-outline-secondary btn-sm" type="button" id="clearAvatarBtn">Xoá ảnh</button>
              </div>

              <div class="col-12">
                <button id="registerBtn" class="btn btn-primary w-100" type="submit">Đăng ký</button>
              </div>
              <div class="col-12">
                <p id="register-result" class="mt-2 text-center"></p>
              </div>
            </div>
          </form>
          <p class="text-center text-muted mb-0 mt-2">Đã có tài khoản? <a href="index.html">Đăng nhập</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ====== BUILD INFO (để chắc đang dùng đúng file) ======
    console.info("REGISTER BUILD", "2025-08-15T15:00+07:00");

    // ====== Config ======
    const API_BASE = "http://localhost:8080";

    // ====== DOM refs ======
    const regForm = document.getElementById("register-form");
    const registerBtn = document.getElementById("registerBtn");
    const registerResult = document.getElementById("register-result");

    const avatarFileInput = document.getElementById("avatarFile");
    const avatarUrlInput  = document.getElementById("avatarUrl");
    const avatarPreview   = document.getElementById("avatarPreview");
    const clearAvatarBtn  = document.getElementById("clearAvatarBtn");

    // ====== Helpers ======
    const toBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
    });
    function setBusy(el, text){
      el.dataset.old = el.innerHTML;
      el.disabled = true;
      el.innerHTML = text + "…";
    }
    function clearBusy(el){
      el.disabled = false;
      el.innerHTML = el.dataset.old || "Xong";
    }
    function showMsg(ok, msg){
      registerResult.className = ok ? "text-success" : "text-danger";
      registerResult.textContent = msg;
    }
    function redirectToOtp(email){
      try { sessionStorage.setItem("pendingEmail", email); } catch(e) {}
      const url = "otp.html?email=" + encodeURIComponent(email);
      // replace() để không quay lại trang đăng ký bằng Back
      window.location.replace(url);
      // Fallback nếu browser chặn replace
      setTimeout(() => { if (!/otp\.html/i.test(location.href)) window.location.href = url; }, 150);
    }

    // ====== Loại bỏ mọi handler khác mở popup (nếu có) ======
    // Xoá mọi attribute kích hoạt modal trên nút submit nếu được set từ HTML cũ
    (function stripModalAttrs(){
      const btn = document.getElementById("registerBtn");
      if (!btn) return;
      ["data-bs-toggle","data-toggle","data-target","data-bs-target","onclick"].forEach(attr => {
        if (btn.hasAttribute(attr)) btn.removeAttribute(attr);
      });
    })();

    // ====== Avatar preview ======
    avatarFileInput.addEventListener("change", () => {
      const file = avatarFileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        avatarPreview.src = e.target.result;
        avatarPreview.style.display = "block";
        clearAvatarBtn.style.display = "inline-block";
      };
      reader.readAsDataURL(file);
    });
    avatarUrlInput.addEventListener("input", () => {
      const url = avatarUrlInput.value.trim();
      if (url.startsWith("http")) {
        avatarPreview.src = url;
        avatarPreview.style.display = "block";
        clearAvatarBtn.style.display = "inline-block";
      } else {
        avatarPreview.src = "";
        avatarPreview.style.display = "none";
        clearAvatarBtn.style.display = "none";
      }
    });
    clearAvatarBtn.addEventListener("click", () => {
      avatarPreview.src = "";
      avatarPreview.style.display = "none";
      clearAvatarBtn.style.display = "none";
      avatarFileInput.value = "";
      avatarUrlInput.value = "";
    });

    // ====== Submit Register -> Redirect to OTP page (no popup) ======
    regForm.addEventListener("submit", async (e) => {
      // Chặn và NGĂN các listener khác (có thể mở modal) xử lý tiếp
      e.preventDefault();
      e.stopPropagation();
      if (e.stopImmediatePropagation) e.stopImmediatePropagation();

      showMsg(true, "");

      // Basic validation
      const username = regForm.username.value.trim();
      const password = regForm.password.value;
      const email    = regForm.email.value.trim();
      if (!username || !password || !email){
        showMsg(false, "Vui lòng điền đủ Tên đăng nhập, Mật khẩu và Email.");
        return;
      }

      setBusy(registerBtn, "Đang gửi");

      try {
        let avatar = "";
        if (avatarFileInput.files[0]) {
          avatar = await toBase64(avatarFileInput.files[0]);
        } else if (avatarUrlInput.value.trim() !== "") {
          avatar = avatarUrlInput.value.trim();
        }

        const payload = {
          username,
          password,
          name: regForm.name.value.trim(),
          email,
          phone: regForm.phone.value.trim(),
          address: regForm.address.value.trim(),
          avatar
        };

        const res = await fetch(API_BASE + "/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        // Không đọc body để tránh block redirect khi network chậm
        if (res.status >= 200 && res.status < 300){
          redirectToOtp(email);
          return;
        }

        const txt = await res.text().catch(()=> "");
        showMsg(false, txt || "Đăng ký thất bại. Vui lòng kiểm tra lại thông tin.");
      } catch (err){
        console.error("Register error:", err);
        showMsg(false, "Không thể kết nối máy chủ (CORS/Network). Kiểm tra API_BASE hoặc CORS trên BE.");
      } finally {
        clearBusy(registerBtn);
      }
    }, true); // useCapture=true để handler của mình chạy TRƯỚC các handler khác
  </script>
</body>
</html>
