<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xác thực OTP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    body { background:#fafafa; }
    .card { border:1px solid #eee; box-shadow:0 8px 30px rgba(0,0,0,.06); border-radius:16px; }
    .btn-primary { background:#2d6cdf; border:none; }
    .btn-primary:hover { background:#255ac0; }
    .form-control { border-radius:12px; }
    #otp-result { font-weight:600; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card p-4">
          <h2 class="text-center mb-3">Xác thực email</h2>
          <p class="text-center text-muted">Mã OTP đã được gửi tới email <b id="emailDisplay"></b>.</p>

          <form id="otp-form" class="row g-3" novalidate>
            <div class="col-12">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" readonly />
            </div>
            <div class="col-12">
              <label class="form-label" for="code">Mã OTP</label>
              <input class="form-control" id="code" name="code" placeholder="Nhập mã 6 số" />
            </div>
            <div class="col-12">
              <button id="verifyBtn" type="submit" class="btn btn-primary w-100">Xác minh OTP</button>
            </div>
          </form>

          <div class="d-flex justify-content-between align-items-center mt-2">
            <button id="resendBtn" class="btn btn-outline-secondary btn-sm" disabled>Gửi lại mã (60s)</button>
            <span id="countdownNote" class="text-muted small"></span>
          </div>

          <p id="otp-result" class="mt-2 text-center"></p>

          <div class="text-center mt-3">
            <a href="register.html" class="small">Quay về đăng ký</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8080";

    const emailInput = document.getElementById("email");
    const emailDisplay = document.getElementById("emailDisplay");
    const codeInput  = document.getElementById("code");
    const otpForm    = document.getElementById("otp-form");
    const verifyBtn  = document.getElementById("verifyBtn");
    const resendBtn  = document.getElementById("resendBtn");
    const countdownNote = document.getElementById("countdownNote");
    const otpResult  = document.getElementById("otp-result");

    function setBusy(el, text){
      el.dataset.old = el.innerHTML;
      el.disabled = true;
      el.innerHTML = text + "…";
    }
    function clearBusy(el){
      el.disabled = false;
      el.innerHTML = el.dataset.old || "Xong";
    }
    function showMsg(ok, msg){
      otpResult.className = ok ? "text-success" : "text-danger";
      otpResult.textContent = msg;
    }

    // Load email from sessionStorage or query string
    function getEmailFromContext(){
      const url = new URL(location.href);
      const qEmail = url.searchParams.get("email");
      const sEmail = sessionStorage.getItem("pendingEmail");
      return qEmail || sEmail || "";
    }

    function startCooldown(seconds){
      let remain = seconds;
      resendBtn.disabled = true;
      resendBtn.textContent = `Gửi lại mã (${remain}s)`;
      countdownNote.textContent = "Bạn có thể yêu cầu mã mới sau khi hết thời gian đếm ngược.";
      const interval = setInterval(()=>{
        remain--;
        resendBtn.textContent = `Gửi lại mã (${remain}s)`;
        if (remain <= 0){
          clearInterval(interval);
          resendBtn.disabled = false;
          resendBtn.textContent = "Gửi lại mã";
          countdownNote.textContent = "";
        }
      }, 1000);
    }

    // Init
    (function init(){
      const email = getEmailFromContext();
      if (!email){
        // No context -> return to register
        window.location.replace("register.html");
        return;
      }
      emailInput.value = email;
      emailDisplay.textContent = email;
      startCooldown(60);
      codeInput.focus();
    })();

    // Verify OTP
    otpForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      showMsg(true, "");

      const email = emailInput.value;
      const code  = codeInput.value.trim();
      if (!/^\d{6}$/.test(code)){
        showMsg(false, "Mã OTP phải gồm 6 chữ số.");
        return;
      }

      setBusy(verifyBtn, "Đang xác minh");
      try {
        const res = await fetch(API_BASE + "/auth/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, code })
        });
        const text = await res.text();
        if (res.ok){
          showMsg(true, "Xác thực email thành công. Đăng ký hoàn tất!");
          sessionStorage.removeItem("pendingEmail");
          // Tuỳ chọn điều hướng sang login:
          setTimeout(()=> location.href = "index.html", 1200);
        } else {
          showMsg(false, text || "Mã OTP không đúng hoặc đã hết hạn.");
        }
      } catch(err){
        showMsg(false, "Lỗi mạng. Vui lòng thử lại.");
      } finally {
        clearBusy(verifyBtn);
      }
    });

    // Resend OTP
    resendBtn.addEventListener("click", async () => {
      resendBtn.disabled = true;
      try {
        const email = emailInput.value;
        const res = await fetch(API_BASE + "/auth/otp/resend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const text = await res.text();
        if (res.ok){
          showMsg(true, text || "Đã gửi lại mã OTP.");
          startCooldown(60);
        } else {
          showMsg(false, text || "Không thể gửi lại OTP lúc này.");
          startCooldown(10);
        }
      } catch {
        showMsg(false, "Không thể kết nối máy chủ. Thử lại sau.");
        startCooldown(10);
      }
    });
  </script>
</body>
</html>
